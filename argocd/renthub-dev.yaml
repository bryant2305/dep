---
# ArgoCD Application for Development Environment
# Auto-updated by workflows
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: renthub-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: https://github.com/bryant2305/dep
    targetRevision: HEAD
    path: helm/renthub-chart
    helm:
      releaseName: renthub-dev
      valueFiles:
        - values-dev.yaml
  
  destination:
    server: https://kubernetes.default.svc
    namespace: renthub-dev
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
