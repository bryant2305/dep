name: Staging Deployment Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - 'helm/renthub-chart/values-staging.yaml'
      - 'helm/renthub-chart/values-prod.yaml'
      - 'helm/renthub-chart/templates/**'
      - '.github/workflows/validate-staging.yml'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Lint Helm chart
        run: |
          echo "Linting Helm chart..."
          helm lint helm/renthub-chart/

      - name: Generate staging manifests
        run: |
          echo "Generating staging manifests..."
          helm template renthub-staging helm/renthub-chart \
            -f helm/renthub-chart/values-staging.yaml \
            > /tmp/staging-manifests.yaml

      - name: Generate prod manifests
        run: |
          echo "Generating production manifests..."
          helm template renthub-prod helm/renthub-chart \
            -f helm/renthub-chart/values-prod.yaml \
            > /tmp/prod-manifests.yaml

      - name: Check resource limits are set
        run: |
          echo "Verifying all resources have limits set..."

          if grep -q "limits:" /tmp/staging-manifests.yaml && \
             grep -q "limits:" /tmp/prod-manifests.yaml; then
            echo "All resources have limits defined"
          else
            echo "Missing resource limits"
            exit 1
          fi

      - name: Check namespaces are correct
        run: |
          echo "Verifying namespace configuration..."

          grep -q "namespace: renthub-staging" /tmp/staging-manifests.yaml
          grep -q "namespace: renthub-prod" /tmp/prod-manifests.yaml

      - name: Add comment to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const comment = [
              '## Helm Validation Results',
              '',
              '### Staging Deployment',
              '- Helm chart linting passed',
              '',
              '### Production Deployment',
              '- Resource limits verified',
              '- Namespaces configured correctly',
              '',
              '**Note:** This change requires manual sync in ArgoCD and should be reviewed before deployment.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });