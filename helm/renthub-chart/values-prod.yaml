# Production environment values (Optimized for Local/Test Cluster)

environment: production
namespace: renthub-prod
image:
  pullPolicy: Always
global:
  domain: renthub.com

database:
  mysql:
    enabled: true
    replicas: 1
    port: 3306
    image: mysql:8.0
    storage:
      size: 5Gi  # Reduced from 50Gi for local disk constraints
      className: standard
    resources:
      requests:
        memory: "256Mi" # Reduced to ensure scheduling
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  mongodb:
    enabled: true
    replicas: 1
    port: 27017
    image: mongo:5.0
    storage:
      size: 5Gi  # Reduced from 50Gi
      className: standard
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  redis:
    enabled: true
    replicas: 1
    port: 6379
    image: redis:7-alpine
    storage:
      size: 2Gi  # Reduced from 20Gi
      className: standard
    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "250m"

services:
  gateway:
    replicas: 2  # Reduced from 3 to save RAM, but keeps HA testing
    image: ghcr.io/bryant2305/gateway:1149c34-prod
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  auth:
    replicas: 2
    image: ghcr.io/bryant2305/auth:latest
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  user:
    replicas: 2
    image: ghcr.io/bryant2305/user:8966ecb-prod
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  property:
    replicas: 2
    image: ghcr.io/bryant2305/property:latest
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  reservation:
    replicas: 2
    image: ghcr.io/bryant2305/reservation:8966ecb-prod
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  mail:
    replicas: 1  # Kept at 1 as background workers usually need less HA locally
    image: ghcr.io/bryant2305/mail:latest
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "250m"

configMap:
  NODE_ENV: "production"
  LOG_LEVEL: "warn"
  LOG_FORMAT: "json"

