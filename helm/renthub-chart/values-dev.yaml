# Development environment values

environment: development
namespace: renthub-dev

image:
  pullPolicy: Always

global:
  domain: renthub-dev.local

database:
  mysql:
    enabled: true
    replicas: 1
    image: mysql:8.0
    storage:
      size: 5Gi
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

  mongodb:
    enabled: true
    replicas: 1
    image: mongo:5.0
    storage:
      size: 5Gi
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

  redis:
    enabled: true
    replicas: 1
    image: redis:7-alpine
    storage:
      size: 2Gi
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"

services:
  gateway:
    enabled: true
    replicas: 1
    port: 3333
    image: ghcr.io/bryant2305/gateway:latest
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

  auth:
    enabled: true
    replicas: 1
    port: 3010
    image: ghcr.io/bryant2305/auth:latest
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

  user:
    enabled: true
    replicas: 1
    port: 3000
    image: ghcr.io/bryant2305/user:latest
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

  property:
    enabled: true
    replicas: 1
    port: 3003
    image: ghcr.io/bryant2305/property:latest
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

  reservation:
    enabled: true
    replicas: 1
    port: 3004
    image: ghcr.io/bryant2305/reservation:latest
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

  mail:
    enabled: true
    replicas: 1
    port: 3006
    image: ghcr.io/bryant2305/mail:latest
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"

configMap:
  NODE_ENV: "development"
  LOG_LEVEL: "debug"
  LOG_FORMAT: "text"