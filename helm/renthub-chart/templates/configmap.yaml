---
# ConfigMaps - non-sensitive configuration data
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: {{ .Values.namespace }}
  labels:
    app: renthub
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  # Database hosts
  DB_HOST: "mysql-service.{{ .Values.namespace }}.svc.cluster.local"
  DB_PORT: "3306"
  MONGODB_HOST: "mongo-service.{{ .Values.namespace }}.svc.cluster.local"
  MONGODB_PORT: "27017"
  REDIS_HOST: "redis-service.{{ .Values.namespace }}.svc.cluster.local"
  REDIS_PORT: "6379"

  # Service endpoints (internal HTTP communication)
  AUTH_SERVICE_URL: "http://auth-service.{{ .Values.namespace }}.svc.cluster.local:3010"
  USER_SERVICE_URL: "http://user-service.{{ .Values.namespace }}.svc.cluster.local:3000"
  PROPERTY_SERVICE_URL: "http://property-service.{{ .Values.namespace }}.svc.cluster.local:3003"
  RESERVATION_SERVICE_URL: "http://reservation-service.{{ .Values.namespace }}.svc.cluster.local:3004"
  MAIL_SERVICE_URL: "http://mail-service.{{ .Values.namespace }}.svc.cluster.local:3006"
  GATEWAY_SERVICE_URL: "http://gateway-service.{{ .Values.namespace }}.svc.cluster.local:3333"

  # gRPC endpoints (host:port, no http://)
  EMAIL_URL: "mail-service.{{ .Values.namespace }}.svc.cluster.local:3006"
  USER_URL: "user-service.{{ .Values.namespace }}.svc.cluster.local:3005"
  AUTH_SERVICE_GRPC_URL: "auth-service.{{ .Values.namespace }}.svc.cluster.local:3008"
  PROPERTY_SERVICE_GRPC_URL: "property-service.{{ .Values.namespace }}.svc.cluster.local:3007"
  RESERVATION_SERVICE_GRPC_URL: "reservation-service.{{ .Values.namespace }}.svc.cluster.local:3009"

  # Application settings
  NODE_ENV: "{{ .Values.configMap.NODE_ENV }}"
  LOG_LEVEL: "{{ .Values.configMap.LOG_LEVEL }}"
  LOG_FORMAT: "{{ .Values.configMap.LOG_FORMAT }}"

---
# Gateway ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: {{ .Values.namespace }}
  labels:
    app: gateway
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  GATEWAY_PORT: "3333"
  SERVICE_NAME: "gateway"
  URL: "0.0.0.0"

---
# Auth Service ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: {{ .Values.namespace }}
  labels:
    app: auth-service
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  AUTH_PORT: "3010"
  SERVICE_NAME: "auth-service"
  URL: "0.0.0.0"

---
# User Service ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: {{ .Values.namespace }}
  labels:
    app: user-service
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  USER_PORT: "3000"
  APP_PORT: "3011"
  SERVICE_NAME: "user-service"
  URL: "0.0.0.0"

---
# Property Service ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: property-service-config
  namespace: {{ .Values.namespace }}
  labels:
    app: property-service
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  PROPERTY_PORT: "3003"
  SERVICE_NAME: "property-service"
  URL: "0.0.0.0"

---
# Reservation Service ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: reservation-service-config
  namespace: {{ .Values.namespace }}
  labels:
    app: reservation-service
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  RESERVATION_PORT: "3004"
  SERVICE_NAME: "reservation-service"
  URL: "0.0.0.0"

---
# Mail Service ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: mail-service-config
  namespace: {{ .Values.namespace }}
  labels:
    app: mail-service
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  APP_PORT: "3006"
  PORT: "3009"
  SERVICE_NAME: "mail-service"
  URL: "0.0.0.0"
  MAIL_ENCRYPTION: "tls"
  MAIL_FROM_ADDRESS: "{{ .Values.mail.fromAddress }}"
  MAIL_FROM_NAME: "{{ .Values.mail.fromName }}"
  MAIL_HOST: "{{ .Values.mail.host }}"
  MAIL_PORT: "587"
  MAIL_USERNAME: "{{ .Values.mail.username }}"