---
# Storage Class for persistent volumes
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-storage
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer

---
# MySQL Persistent Volume Claim
{{- if .Values.database.mysql.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: {{ .Values.namespace }}
  labels:
    app: mysql
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.database.mysql.storage.className }}
  resources:
    requests:
      storage: {{ .Values.database.mysql.storage.size }}
{{- end }}

---
# MongoDB Persistent Volume Claim
{{- if .Values.database.mongodb.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
  namespace: {{ .Values.namespace }}
  labels:
    app: mongo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.database.mongodb.storage.className }}
  resources:
    requests:
      storage: {{ .Values.database.mongodb.storage.size }}
{{- end }}

---
# Redis Persistent Volume Claim
{{- if .Values.database.redis.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: {{ .Values.namespace }}
  labels:
    app: redis
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.database.redis.storage.className }}
  resources:
    requests:
      storage: {{ .Values.database.redis.storage.size }}
{{- end }}
