---
# Services - expose pods to network traffic
# MySQL Service (ClusterIP - internal only)
{{- if .Values.database.mysql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: {{ .Values.namespace }}
  labels:
    app: mysql
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  selector:
    app: mysql
  ports:
    - port: {{ .Values.database.mysql.port }}
      targetPort: {{ .Values.database.mysql.port }}
      protocol: TCP
  type: ClusterIP
{{- end }}

