---
# MySQL StatefulSet
{{- if .Values.database.mysql.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: {{ .Values.namespace }}
  labels:
    app: mysql
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  serviceName: mysql-service
  replicas: {{ .Values.database.mysql.replicas }}
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: {{ .Values.database.mysql.image }}
        ports:
        - containerPort: {{ .Values.database.mysql.port }}
          name: mysql

        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_PASSWORD
        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_DATABASE

        resources:
          requests:
            memory: {{ .Values.database.mysql.resources.requests.memory | quote }}
            cpu: {{ .Values.database.mysql.resources.requests.cpu | quote }}
          limits:
            memory: {{ .Values.database.mysql.resources.limits.memory | quote }}
            cpu: {{ .Values.database.mysql.resources.limits.cpu | quote }}

        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql

  volumeClaimTemplates:
  - metadata:
      name: mysql-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: {{ .Values.database.mysql.storage.className }}
      resources:
        requests:
          storage: {{ .Values.database.mysql.storage.size }}
{{- end }}

---
# MongoDB StatefulSet
{{- if .Values.database.mongodb.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: {{ .Values.namespace }}
  labels:
    app: mongo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  serviceName: mongo-service
  replicas: {{ .Values.database.mongodb.replicas }}
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
      - name: mongo
        image: {{ .Values.database.mongodb.image }}
        ports:
        - containerPort: {{ .Values.database.mongodb.port }}
