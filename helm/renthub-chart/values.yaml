database:
  mysql:
    enabled: true
    replicas: 1
    port: 3306
    image: mysql:8.0
    storage:
      size: 10Gi
      className: standard
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  mongodb:
    enabled: true
    replicas: 1
    port: 27017
    image: mongo:5.0
    storage:
      size: 10Gi
      className: standard
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  redis:
    enabled: true
    replicas: 1
    port: 6379
    image: redis:7-alpine
    storage:
      size: 5Gi
      className: standard
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"
