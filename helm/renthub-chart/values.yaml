# Default values for renthub Helm chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

environment: development
namespace: renthub

# Image configuration
image:
  pullPolicy: IfNotPresent

# Global settings
global:
  domain: renthub.local
  
# Database configuration
database:
  mysql:
    enabled: true
    replicas: 1
    image: mysql:8.0
    port: 3306
    service: mysql-service
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    storage:
      size: 5Gi
      className: local-storage
    
  mongodb:
    enabled: true
    replicas: 1
    image: mongo:5.0
    port: 27017
    service: mongo-service
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    storage:
      size: 5Gi
      className: local-storage
  
  redis:
    enabled: true
    replicas: 1
    image: redis:7-alpine
    port: 6379
    service: redis-service
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"
    storage:
      size: 2Gi
      className: local-storage

# Microservices configuration
services:
  gateway:
    enabled: true
    replicas: 2
    image: renthub/gateway:latest
    port: 3333
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  
  auth:
    enabled: true
    replicas: 2
    image: renthub/auth-service:latest
    port: 3010
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  
  user:
    enabled: true
    replicas: 2
    image: renthub/user-service:latest
    port: 3000
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  
  property:
    enabled: true
    replicas: 2
    image: renthub/property-service:latest
    port: 3003
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  
  reservation:
    enabled: true
    replicas: 2
    image: renthub/reservation-service:latest
    port: 3004
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  
  mail:
    enabled: true
    replicas: 1
    image: renthub/mail-service:latest
    port: 3006
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"

# ConfigMap settings
configMap:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

# Secret settings (referenced but not hardcoded)
secrets:
  dbCredentials:
    name: db-credentials
  mongodbCredentials:
    name: mongodb-credentials
  redisCredentials:
    name: redis-credentials

# Storage configuration
storage:
  storageClass: local-storage
